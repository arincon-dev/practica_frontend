<!--<div class="dialog-overlay" (click)="onCancel()"></div>-->
<div class="dialog-overlay"></div>
<div class="dialog-box">
    <div class="dialog-title">
        <h2>Create User / Edit User</h2>
    </div>

    <div class="dialog-content">
        <div *ngIf="errorMessage" class="errorClass">{{ errorMessage }}</div>

        <form *ngIf="!loading" class="popup-form-grid">
            <div class="form-group">
                <label>Username</label>
                <input type="text" [(ngModel)]="usuario.nickUsuario" name="nickUsuario" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" [(ngModel)]="usuario.contrasena" name="contrasena" required>
            </div>
            <div class="form-group">
                <label>Creation Date</label>
                <input type="text" [value]="usuario.fechaHoraCreacion | date:'yyyy-MM-dd HH:mm'" disabled>
            </div>

            <div class="form-group">
                <label>First Name</label>
                <input type="text" [(ngModel)]="usuario.nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label>First Surname</label>
                <input type="text" [(ngModel)]="usuario.primerApellido" name="primerApellido" required>
            </div>
            <div class="form-group">
                <label>Second Surname</label>
                <input type="text" [(ngModel)]="usuario.segundoApellido" name="segundoApellido">
            </div>

            <div class="form-group">
                <label>BirthDate</label>
                <input
                    type="text"
                    [(ngModel)]="fechaNacimientoUi"
                    name="fechaNacimientoUi"
                    placeholder="dd/MM/yyyy"
                    inputmode="numeric"
                    autocomplete="off"
                    required
                >
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select [(ngModel)]="usuario.genero.id" name="genero" required>
                    <option [ngValue]="null">Select gender</option>
                    <option *ngFor="let g of generos" [ngValue]="g.id">{{ g.nombre }}</option>
                </select>
            </div>
            <div class="form-group">
                <label>Job Position</label>
                <select [(ngModel)]="usuario.puestoTrabajo.id" name="puestoTrabajo" required>
                    <option [ngValue]="null">Select job position</option>
                    <option *ngFor="let p of puestos" [ngValue]="p.id">{{ p.nombre }}</option>
                </select>
            </div>

            <div class="form-group form-group-small">
                <label>Breakfast Time</label>
                <input
                    type="text"
                    [(ngModel)]="horaDesayunoUi"
                    name="horaDesayunoUi"
                    placeholder="HH:mm"
                    inputmode="numeric"
                    autocomplete="off"
                    required
                >
            </div>
        </form>

        <div class="addresses-section">
            <h3>Addresses</h3>

            <div class="container-button">
                <button type="button" class="main-button" (click)="mostrarFormularioDireccionCrear()">Create</button>
                <button type="button" class="main-button" [disabled]="selectedDireccionIndex < 0" (click)="mostrarFormularioDireccionEditar()">Update</button>
                <button type="button" class="main-button-icon" [disabled]="selectedDireccionIndex < 0" (click)="eliminarDireccionSeleccionada()">
                    🗑
                </button>
            </div>

            <div *ngIf="modoDireccion === 'FORM'" class="new-direction-form">
                <div class="form-row">
                    <div class="form-column">
                        <label>Street Name</label>
                        <input class="form-control" type="text" [(ngModel)]="nuevaDireccion.nombreCalle" name="nombreCalle">
                    </div>
                    <div class="form-column small-column">
                        <label>Number</label>
                        <input class="form-control" type="number" [(ngModel)]="nuevaDireccion.numeroCalle" name="numeroCalle">
                    </div>
                    <div class="form-column inline-actions">
                        <button type="button" class="default-btn" (click)="onGuardarDireccion()">Save</button>
                        <button type="button" class="default-btn" (click)="cancelarNuevaDireccion()">Cancel</button>
                    </div>
                </div>
            </div>

            <div class="table-scroll">
                <table *ngIf="direcciones.length > 0; else sinDirecciones">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Principal</th>
                            <th>Street Name</th>
                            <th>Number</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let dir of direcciones; let i = index">
                            <td>
                                <input
                                    type="radio"
                                    name="direccionSeleccionada"
                                    [checked]="selectedDireccionIndex === i"
                                    (change)="seleccionarDireccion(i)"
                                >
                            </td>
                            <td>
                                <input
                                    type="radio"
                                    name="direccionPrincipal"
                                    [checked]="dir.direccionPrincipal"
                                    (change)="establecerPrincipal(i)"
                                >
                            </td>
                            <td>{{ dir.nombreCalle }}</td>
                            <td>{{ dir.numeroCalle }}</td>
                        </tr>
                    </tbody>
                </table>
                <ng-template #sinDirecciones>
                    <div class="no-data">No addresses yet.</div>
                </ng-template>
            </div>
        </div>

        <div *ngIf="loading">Guardando usuario...</div>
    </div>

    <div class="container-button-right">
        <button class="main-button" (click)="onSave()" [disabled]="loading">Save</button>
        <button class="main-button default-btn" (click)="onCancel()" [disabled]="loading">Cancel</button>
    </div>
</div>
